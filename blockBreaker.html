<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Breaker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 50%, #0d0d3d 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            display: flex;
            justify-content: space-between;
            width: 480px;
            padding: 10px 0;
            color: #fff;
        }
        .header span {
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .score { color: #00e676; }
        .lives { color: #ff5252; }
        .level { color: #ffab40; }
        .timer { color: #80deea; }
        canvas {
            border: 2px solid #3a3a7e;
            border-radius: 8px;
            background: linear-gradient(180deg, #0d1b2a 0%, #1b2838 100%);
            box-shadow: 0 0 30px rgba(100, 100, 255, 0.2), inset 0 0 30px rgba(0,0,0,0.3);
        }
        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            z-index: 10;
        }
        .overlay h1 {
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.8);
        }
        .overlay h2 {
            font-size: 22px;
            margin-bottom: 15px;
            color: #aaa;
        }
        .overlay p {
            font-size: 16px;
            color: #ccc;
            margin-bottom: 8px;
        }
        .overlay .start-btn {
            margin-top: 20px;
            padding: 12px 36px;
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #00c853, #00e676);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 200, 100, 0.4);
        }
        .overlay .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(0, 200, 100, 0.6);
        }
        .instructions {
            margin-top: 15px;
            padding: 12px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .instructions p {
            font-size: 13px;
            color: #888;
            margin: 4px 0;
        }
        .level-popup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffab40;
            font-size: 36px;
            font-weight: 900;
            text-shadow: 0 0 30px rgba(255, 171, 64, 0.8);
            opacity: 0;
            pointer-events: none;
            z-index: 20;
        }
        .level-popup.show {
            animation: levelPulse 1.5s ease-out forwards;
        }
        @keyframes levelPulse {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
            80% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <span class="score">Score: <span id="score">0</span></span>
            <span class="timer">Next Level: <span id="timer">1:30</span></span>
            <span class="level">Level: <span id="level">1</span></span>
            <span class="lives">Lives: <span id="lives">3</span></span>
        </div>
        <canvas id="gameCanvas" width="480" height="400"></canvas>
        <div class="level-popup" id="levelPopup">LEVEL UP!</div>
        <div class="overlay" id="overlay">
            <h1>Block Breaker</h1>
            <h2>Smash all the blocks!</h2>
            <div class="instructions">
                <p>Move mouse or touch to control the paddle</p>
                <p>Arrow keys also work</p>
                <p>Break all blocks to score — level up every 1.5 min!</p>
            </div>
            <button class="start-btn" id="startBtn">PLAY NOW</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('startBtn');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const levelEl = document.getElementById('level');
        const timerEl = document.getElementById('timer');
        const levelPopup = document.getElementById('levelPopup');

        const LEVEL_TIME = 90; // 1.5 minutes

        let gameRunning = false;
        let score = 0;
        let lives = 3;
        let level = 1;
        let animationId;
        let levelTimer = 0;
        let lastTime = 0;

        // Paddle
        const paddle = { width: 80, height: 12, x: 200, speed: 8 };
        paddle.y = canvas.height - 30;

        // Ball
        let ball = { x: 240, y: 300, radius: 7, dx: 4, dy: -4, speed: 4 };

        // Bricks
        const brickRowCount = 5;
        const brickColumnCount = 8;
        const brickWidth = 52;
        const brickHeight = 20;
        const brickPadding = 4;
        const brickOffsetTop = 40;
        const brickOffsetLeft = 12;
        let bricks = [];

        const brickColors = [
            ['#ff6b6b', '#ff8e8e'],
            ['#ffa940', '#ffcb40'],
            ['#ffeb3b', '#fff176'],
            ['#69f0ae', '#b9f6ca'],
            ['#40c4ff', '#80d8ff']
        ];

        let particles = [];

        function createBricks() {
            bricks = [];
            for (let c = 0; c < brickColumnCount; c++) {
                bricks[c] = [];
                for (let r = 0; r < brickRowCount; r++) {
                    let hits = r < 2 && level > 2 ? 2 : 1;
                    bricks[c][r] = { x: 0, y: 0, status: hits, maxHits: hits };
                }
            }
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x, y,
                    dx: (Math.random() - 0.5) * 6,
                    dy: (Math.random() - 0.5) * 6,
                    radius: Math.random() * 3 + 1,
                    color, life: 1
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.dx; p.y += p.dy; p.life -= 0.03;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color + Math.floor(p.life * 255).toString(16).padStart(2, '0');
                ctx.fill();
            });
        }

        function drawBall() {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            const gradient = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 1, ball.x, ball.y, ball.radius);
            gradient.addColorStop(0, '#ffffff');
            gradient.addColorStop(1, '#64b5f6');
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.shadowColor = '#64b5f6';
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function drawPaddle() {
            ctx.beginPath();
            ctx.roundRect(paddle.x, paddle.y, paddle.width, paddle.height, 6);
            const gradient = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.height);
            gradient.addColorStop(0, '#e0e0e0');
            gradient.addColorStop(1, '#9e9e9e');
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.shadowColor = '#ffffff';
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function drawBricks() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    if (bricks[c][r].status > 0) {
                        let brickX = c * (brickWidth + brickPadding) + brickOffsetLeft;
                        let brickY = r * (brickHeight + brickPadding) + brickOffsetTop;
                        bricks[c][r].x = brickX;
                        bricks[c][r].y = brickY;

                        ctx.beginPath();
                        ctx.roundRect(brickX, brickY, brickWidth, brickHeight, 4);
                        let alpha = bricks[c][r].status < bricks[c][r].maxHits ? '99' : 'ff';
                        const grad = ctx.createLinearGradient(brickX, brickY, brickX, brickY + brickHeight);
                        grad.addColorStop(0, brickColors[r][0] + alpha);
                        grad.addColorStop(1, brickColors[r][1] + alpha);
                        ctx.fillStyle = grad;
                        ctx.fill();
                    }
                }
            }
        }

        function updateTimer() {
            let remaining = LEVEL_TIME - (levelTimer % LEVEL_TIME);
            let mins = Math.floor(remaining / 60);
            let secs = Math.floor(remaining % 60);
            timerEl.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function levelUp() {
            level++;
            levelEl.textContent = level;
            ball.speed += 0.5;
            createBricks();
            resetBall();
            levelPopup.classList.add('show');
            setTimeout(() => levelPopup.classList.remove('show'), 1500);
        }

        function collisionDetection() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    let b = bricks[c][r];
                    if (b.status > 0) {
                        if (ball.x > b.x && ball.x < b.x + brickWidth &&
                            ball.y > b.y && ball.y < b.y + brickHeight) {
                            ball.dy = -ball.dy;
                            b.status--;
                            if (b.status === 0) {
                                score += 10 * level;
                                scoreEl.textContent = score;
                                createParticles(b.x + brickWidth/2, b.y + brickHeight/2, brickColors[r][0]);
                            }
                            let allDestroyed = true;
                            for (let cc = 0; cc < brickColumnCount; cc++) {
                                for (let rr = 0; rr < brickRowCount; rr++) {
                                    if (bricks[cc][rr].status > 0) allDestroyed = false;
                                }
                            }
                            if (allDestroyed) createBricks();
                        }
                    }
                }
            }
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height - 50;
            ball.dx = ball.speed * (Math.random() > 0.5 ? 1 : -1);
            ball.dy = -ball.speed;
        }

        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            overlay.querySelector('h1').textContent = 'Game Over!';
            overlay.querySelector('h2').textContent = `Final Score: ${score}`;
            overlay.querySelector('.instructions').innerHTML = `<p>You reached Level ${level}</p>`;
            startBtn.textContent = 'PLAY AGAIN';
            overlay.style.display = 'block';
        }

        function draw(timestamp) {
            if (!lastTime) lastTime = timestamp;
            let delta = (timestamp - lastTime) / 1000;
            lastTime = timestamp;

            if (!gameRunning) return;

            // Level timer
            levelTimer += delta;
            updateTimer();
            if (Math.floor(levelTimer / LEVEL_TIME) >= level) {
                levelUp();
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Subtle grid
            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
            for (let i = 0; i < canvas.width; i += 40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }

            // Progress bar
            let progress = (levelTimer % LEVEL_TIME) / LEVEL_TIME;
            ctx.fillStyle = 'rgba(255, 171, 64, 0.2)';
            ctx.fillRect(0, 0, canvas.width, 4);
            ctx.fillStyle = '#ffab40';
            ctx.fillRect(0, 0, canvas.width * progress, 4);

            drawBricks();
            drawBall();
            drawPaddle();
            drawParticles();
            updateParticles();
            collisionDetection();

            if (ball.x + ball.dx > canvas.width - ball.radius || ball.x + ball.dx < ball.radius) {
                ball.dx = -ball.dx;
            }
            if (ball.y + ball.dy < ball.radius) {
                ball.dy = -ball.dy;
            } else if (ball.y + ball.dy > paddle.y - ball.radius) {
                if (ball.x > paddle.x && ball.x < paddle.x + paddle.width) {
                    let hitPos = (ball.x - paddle.x) / paddle.width;
                    let angle = hitPos * Math.PI - Math.PI/2;
                    let speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
                    ball.dx = speed * Math.cos(angle) * 0.8;
                    ball.dy = -Math.abs(speed * Math.sin(angle) * 0.8);
                    if (Math.abs(ball.dy) < 2) ball.dy = -2;
                } else if (ball.y + ball.dy > canvas.height - ball.radius) {
                    lives--;
                    livesEl.textContent = lives;
                    if (lives === 0) { gameOver(); return; }
                    resetBall();
                }
            }

            ball.x += ball.dx;
            ball.y += ball.dy;

            animationId = requestAnimationFrame(draw);
        }

        let keys = {};
        document.addEventListener('keydown', e => { keys[e.key] = true; });
        document.addEventListener('keyup', e => { keys[e.key] = false; });

        canvas.addEventListener('mousemove', e => {
            if (!gameRunning) return;
            let rect = canvas.getBoundingClientRect();
            paddle.x = (e.clientX - rect.left) - paddle.width / 2;
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;
        });

        canvas.addEventListener('touchmove', e => {
            if (!gameRunning) return;
            e.preventDefault();
            let rect = canvas.getBoundingClientRect();
            paddle.x = (e.touches[0].clientX - rect.left) - paddle.width / 2;
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;
        });

        function updatePaddle() {
            if (keys['ArrowLeft'] && paddle.x > 0) paddle.x -= paddle.speed;
            if (keys['ArrowRight'] && paddle.x + paddle.width < canvas.width) paddle.x += paddle.speed;
            if (gameRunning) requestAnimationFrame(updatePaddle);
        }

        startBtn.addEventListener('click', () => {
            score = 0; lives = 3; level = 1; ball.speed = 4; levelTimer = 0;
            scoreEl.textContent = '0'; livesEl.textContent = '3'; levelEl.textContent = '1';
            paddle.x = canvas.width / 2 - paddle.width / 2;
            createBricks(); resetBall(); particles = [];
            overlay.style.display = 'none';
            gameRunning = true; lastTime = 0;
            updatePaddle();
            animationId = requestAnimationFrame(draw);
        });

        createBricks();
    </script>
</body>
</html>
